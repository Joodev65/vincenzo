<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jjoooozyy Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-deep: #0a0a0c;
    --bg-card: #121216;
    --bg-elevated: #1a1a1f;
    --bg-input: #0e0e12;
    --silver-100: #e8e8ec;
    --silver-200: #c8c8d0;
    --silver-300: #a0a0ac;
    --silver-400: #7a7a88;
    --silver-500: #555560;
    --silver-600: #3a3a44;
    --silver-700: #2a2a32;
    --silver-800: #1e1e24;
    --accent: #c0c0c8;
    --accent-hover: #d8d8e0;
    --border: rgba(192,192,200,0.08);
    --border-hover: rgba(192,192,200,0.18);
    --glow: rgba(192,192,200,0.06);
    --glow-strong: rgba(192,192,200,0.12);
    --success: #22c55e;
    --danger: #ef4444;
    --radius-sm: 12px;
    --radius-md: 18px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

* {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
    background: var(--bg-deep);
    color: var(--silver-100);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

body {
    position: relative;
}

.ambient-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
}
.ambient-bg::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    top: -200px; left: -200px;
    background: radial-gradient(circle, rgba(192,192,200,0.03) 0%, transparent 70%);
    animation: ambientFloat1 20s ease-in-out infinite;
}
.ambient-bg::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    bottom: -150px; right: -150px;
    background: radial-gradient(circle, rgba(192,192,200,0.02) 0%, transparent 70%);
    animation: ambientFloat2 25s ease-in-out infinite;
}
@keyframes ambientFloat1 {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(80px, 60px) scale(1.1); }
}
@keyframes ambientFloat2 {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-60px, -40px) scale(1.15); }
}

.grid-pattern {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image: 
        linear-gradient(rgba(192,192,200,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,192,200,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--silver-700); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--silver-600); }

.container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 2;
}

.popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px) saturate(120%);
    -webkit-backdrop-filter: blur(20px) saturate(120%);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.popup-overlay.active {
    opacity: 1;
    pointer-events: all;
}
.popup-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    width: 100%;
    max-width: 380px;
    overflow: hidden;
    transform: translateY(30px) scale(0.95);
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(192,192,200,0.05);
}
.popup-overlay.active .popup-card {
    transform: translateY(0) scale(1);
}
.popup-header {
    padding: 28px 24px 0;
    text-align: center;
}
.popup-header h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--silver-100);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
}
.popup-header p {
    font-size: 13px;
    color: var(--silver-400);
    font-weight: 400;
    line-height: 1.5;
}
.popup-body {
    padding: 20px 24px;
}
.qris-container {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
}
.qris-img {
    width: 200px;
    height: 200px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    border: 1px solid var(--border);
}
.social-links {
    display: flex;
    gap: 10px;
    width: 100%;
}
.social-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--silver-300);
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    transition: var(--transition);
    cursor: pointer;
}
.social-btn:hover {
    border-color: var(--border-hover);
    background: var(--bg-elevated);
    color: var(--silver-100);
    transform: translateY(-2px);
}
.social-btn svg {
    width: 18px; height: 18px;
    fill: currentColor;
}
.popup-footer {
    padding: 0 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.popup-close-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--silver-300);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.popup-close-btn:hover {
    border-color: var(--border-hover);
    color: var(--silver-100);
    background: var(--silver-800);
}
.popup-close-btn svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
}
.dont-ask-again {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px;
    border-radius: var(--radius-sm);
    transition: var(--transition);
}
.dont-ask-again:hover {
    background: var(--bg-elevated);
}
.dont-ask-again input {
    appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid var(--silver-600);
    border-radius: 4px;
    background: var(--bg-input);
    cursor: pointer;
    position: relative;
    transition: var(--transition);
}
.dont-ask-again input:checked {
    background: var(--silver-500);
    border-color: var(--silver-500);
}
.dont-ask-again input:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 5px; height: 9px;
    border: solid var(--bg-deep);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}
.dont-ask-again span {
    font-size: 12px;
    color: var(--silver-400);
    font-weight: 500;
    user-select: none;
}

.header {
    padding-top: 48px;
    padding-bottom: 24px;
    text-align: center;
}
.header-video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(192,192,200,0.03);
}
.header-video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.header-video-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(10,10,12,0.6) 100%);
    pointer-events: none;
}
.logo-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--silver-700), var(--silver-600));
    padding: 2px;
    margin: 0 auto 20px;
    box-shadow: 0 0 40px var(--glow-strong);
    animation: logoPulse 4s ease-in-out infinite;
}
@keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 30px var(--glow); }
    50% { box-shadow: 0 0 50px var(--glow-strong); }
}
.logo-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--silver-100);
    letter-spacing: -1px;
}
.brand-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -1px;
    color: var(--silver-100);
    margin-bottom: 6px;
}
.brand-subtitle {
    font-size: 13px;
    color: var(--silver-400);
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
}
.live-clock {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 10px 20px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: 'Space Grotesk', monospace;
    font-weight: 600;
    font-size: 13px;
    color: var(--silver-300);
    letter-spacing: 1px;
}
.live-clock svg {
    width: 14px; height: 14px;
    fill: var(--silver-500);
    animation: clockTick 1s ease-in-out infinite;
}
@keyframes clockTick {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}


.music-player {
    position: fixed;
    bottom: 24px;
    right: 16px;
    z-index: 9998;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(192,192,200,0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: var(--transition);
    max-width: 320px;
    width: auto;
}
.music-player:hover {
    border-color: var(--border-hover);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--glow);
}
.music-player.hidden {
    transform: translateY(120%);
    opacity: 0;
    pointer-events: none;
}
.music-cover {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--silver-700), var(--silver-800));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
}
.music-cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(192,192,200,0.1));
}
.music-cover svg {
    width: 22px;
    height: 22px;
    stroke: var(--silver-300);
    stroke-width: 1.5;
    fill: none;
    position: relative;
    z-index: 1;
}
.music-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
}
.music-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--silver-100);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.2px;
}
.music-artist {
    font-size: 11px;
    font-weight: 500;
    color: var(--silver-500);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.music-visualizer {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 24px;
    padding: 0 4px;
}
.visualizer-bar {
    width: 3px;
    background: linear-gradient(to top, var(--silver-600), var(--silver-300));
    border-radius: 2px;
    animation: vizPlay 0.8s ease-in-out infinite alternate;
    opacity: 0.6;
}
.visualizer-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
.visualizer-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
.visualizer-bar:nth-child(3) { height: 12px; animation-delay: 0.2s; }
.visualizer-bar:nth-child(4) { height: 20px; animation-delay: 0.15s; }
.visualizer-bar:nth-child(5) { height: 10px; animation-delay: 0.05s; }
@keyframes vizPlay {
    0% { transform: scaleY(0.3); opacity: 0.3; }
    100% { transform: scaleY(1); opacity: 0.8; }
}
.music-visualizer.paused .visualizer-bar {
    animation: none;
    height: 3px !important;
    opacity: 0.2;
    transition: all 0.4s ease;
}
.music-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}
.music-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--silver-300);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
}
.music-btn:hover {
    border-color: var(--border-hover);
    color: var(--silver-100);
    background: var(--silver-800);
    transform: scale(1.08);
}
.music-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
}
.music-progress {
    position: absolute;
    bottom: 0;
    left: 18px;
    right: 18px;
    height: 2px;
    background: var(--bg-elevated);
    border-radius: 1px;
    overflow: hidden;
}
.music-progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--silver-600), var(--silver-300));
    border-radius: 1px;
    transition: width 0.3s linear;
}
.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
}
.card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(192,192,200,0.1), transparent);
}
.card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--glow);
}
.card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}
.card-header-icon {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.card-header-icon svg {
    width: 18px; height: 18px;
    stroke: var(--silver-300);
    stroke-width: 1.5;
    fill: none;
}
.card-header-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--silver-100);
    letter-spacing: -0.3px;
}

.form-group {
    margin-bottom: 16px;
}
.form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--silver-400);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
}
.form-input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--silver-100);
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: var(--transition);
    font-family: 'Inter', sans-serif;
}
.form-input::placeholder {
    color: var(--silver-600);
}
.form-input:focus {
    border-color: var(--border-hover);
    box-shadow: 0 0 0 3px var(--glow), inset 0 1px 2px rgba(0,0,0,0.1);
}
.form-input:read-only {
    color: var(--silver-500);
    cursor: default;
}

.btn {
    width: 100%;
    padding: 14px 20px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--silver-200);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
}
.btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(192,192,200,0.03), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}
.btn:hover::after { opacity: 1; }
.btn:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.btn:active { transform: translateY(0) scale(0.98); }
.btn svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    flex-shrink: 0;
}
.btn-primary {
    background: linear-gradient(135deg, var(--silver-700), var(--silver-800));
    border-color: var(--silver-600);
    color: var(--silver-100);
}
.btn-primary:hover {
    border-color: var(--silver-500);
    box-shadow: 0 8px 24px rgba(192,192,200,0.08);
}
.btn-row {
    display: flex;
    gap: 10px;
}
.btn-row .btn {
    flex: 1;
}

.badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--silver-300);
    font-family: 'Space Grotesk', monospace;
}

.table-container {
    overflow-x: auto;
    margin: 0 -8px;
    padding: 0 8px;
}
.data-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
}
.data-table thead th {
    font-size: 10px;
    font-weight: 700;
    color: var(--silver-500);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 12px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.data-table thead th:last-child {
    text-align: center;
    width: 50px;
}
.data-table tbody td {
    padding: 14px 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--silver-200);
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
}
.data-table tbody td:last-child {
    text-align: center;
}
.data-table tbody tr {
    transition: var(--transition);
}
.data-table tbody tr:hover {
    background: rgba(192,192,200,0.02);
}
.data-table tbody tr:last-child td {
    border-bottom: none;
}
.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--silver-500);
    font-size: 13px;
    font-weight: 500;
}
.empty-state svg {
    width: 40px; height: 40px;
    stroke: var(--silver-700);
    stroke-width: 1;
    fill: none;
    margin-bottom: 12px;
}
.delete-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--silver-500);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    margin: 0 auto;
}
.delete-btn:hover {
    background: rgba(239,68,68,0.08);
    border-color: rgba(239,68,68,0.2);
    color: var(--danger);
}
.delete-btn svg {
    width: 14px; height: 14px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
}

.toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    z-index: 9999;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
}
.toast-container.show {
    transform: translateX(-50%) translateY(0);
}
.toast {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 24px;

.spinner {

@keyframes fadeInUp {

    to { opacity: 1; transform: translateY(0); }
}

}
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }

<script>
function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('liveClock').querySelector('span').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

function showPopup() {
    if (localStorage.getItem('donationPopupDismissed') === 'true') {
         
        setTimeout(() => {
            startMusic();
        }, 800);
        return;
    }
    const popup = document.getElementById('donationPopup');
    popup.classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closePopup() {
    const popup = document.getElementById('donationPopup');
    const dontAsk = document.getElementById('dontAskAgain');
    if (dontAsk.checked) {
        localStorage.setItem('donationPopupDismissed', 'true');
    }
    popup.classList.remove('active');
    document.body.style.overflow = '';
     
    setTimeout(() => {
        startMusic();
    }, 400);
}

const audio = document.getElementById('bgAudio');
let musicPlaying = false;
let musicProgressInterval = null;

function startMusic() {
    const player = document.getElementById('musicPlayer');
    player.classList.remove('hidden');
    audio.play().then(() => {
        musicPlaying = true;
        updateMusicIcon();
        document.getElementById('musicVisualizer').classList.remove('paused');
        startProgressBar();
    }).catch(e => {
        console.log('Autoplay blocked, user interaction needed');
    });
}

function toggleMusic() {
    if (musicPlaying) {
        audio.pause();
        musicPlaying = false;
        document.getElementById('musicVisualizer').classList.add('paused');
        stopProgressBar();
    } else {
        audio.play().then(() => {
            musicPlaying = true;
            document.getElementById('musicVisualizer').classList.remove('paused');
            startProgressBar();
        });
    }
    updateMusicIcon();
}

function updateMusicIcon() {
    const btn = document.getElementById('musicToggleBtn');
    if (musicPlaying) {
        btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
    } else {
        btn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    }
}

function hideMusicPlayer() {
    const player = document.getElementById('musicPlayer');
    player.classList.add('hidden');
    audio.pause();
    musicPlaying = false;
    document.getElementById('musicVisualizer').classList.add('paused');
    stopProgressBar();
}

function startProgressBar() {
    stopProgressBar();
    musicProgressInterval = setInterval(() => {
        if (audio.duration) {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('musicProgressBar').style.width = pct + '%';
        }
    }, 500);
}

function stopProgressBar() {
    if (musicProgressInterval) {
        clearInterval(musicProgressInterval);
        musicProgressInterval = null;
    }
}

let emailProtectionMap = new Map();

function updateProtectionMap(data) {
    if (!data) return;
    data.forEach(item => {
        const email = item.email;
        const limit = parseInt(item.jumlahResult) || 0;
         
        if (!emailProtectionMap.has(email)) {
            emailProtectionMap.set(email, { target: limit, current: limit });
        } else {
            const existing = emailProtectionMap.get(email);
            existing.current = limit;
             
            if (!existing.target) existing.target = limit;
        }
    });
}

async function checkAndRestoreEmails() {
    try {
        const res = await fetch(`${rorr}?data`);
        const data = await res.json();

        if (!data || !Array.isArray(data)) return;

         
        const currentEmails = new Set();
        data.forEach(item => {
            currentEmails.add(item.email);
            if (emailProtectionMap.has(item.email)) {
                const protected = emailProtectionMap.get(item.email);
                protected.current = parseInt(item.jumlahResult) || 0;
            }
        });

         
        for (const [email, info] of emailProtectionMap) {
            if (!currentEmails.has(email)) {
                 
                if (info.current < info.target) {
                     
                    console.log(`Restoring ${email} - progress ${info.current}/${info.target}`);
                    await fetch(`${rorr}?add=1&email=${encodeURIComponent(email)}&jumlahResult=${encodeURIComponent(info.target)}`);
                    showToast(`Email ${email} dipulihkan (belum selesai)`, 'success');
                } else {
                     
                    emailProtectionMap.delete(email);
                }
            }
        }

         
        renderEmails(data);

    } catch (e) {
        console.log('Protection check failed');
    }
}

async function fetchEmails() {
    try {
        const res = await fetch(`${rorr}?data`);
        const data = await res.json();
        updateProt(data);
        renderEmails(data);
    } catch (e) {
        renderEmails([]);
        showToast('Gagal memuat data', 'error');
    }
}

function showToast(message, type) {
    const container = document.getElementById('toastContainer');
    const toast = document.getElementById('toast');
    const icon = document.getElementById('toastIcon');
    const msg = document.getElementById('toastMessage');

    toast.className = 'toast toast-' + type;
    msg.textContent = message;

    if (type === 'success') {
        icon.innerHTML = '<path d="M20 6L9 17L4 12"/>';
    } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
    }

    container.classList.add('show');
    setTimeout(() => container.classList.remove('show'), 3000);
}

const rorr = '/api/k';

function renderEmails(data) {
    const tbody = document.getElementById('emailData');
    if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3">
            <div class="empty-state">
                <svg viewBox="0 0 24 24"><path d="M13 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V9L13 2Z"/><polyline points="13 2 13 9 20 9"/></svg>
                <div>Belum ada email tersimpan</div>
            </div>
        </td></tr>`;
        return;
    }
    tbody.innerHTML = data.map(item => `
        <tr>
            <td>${escapeHtml(item.email)}</td>
            <td style="text-align:center"><span class="badge">${item.jumlahResult}</span></td>
            <td style="text-align:center">
                <button class="delete-btn" onclick="deleteEmail('${escapeHtml(item.email)}')" title="Hapus">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6V20C19 21.1046 18.1046 22 17 22H7C5.89543 22 5 21.1046 5 20V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                </button>
            </td>
        </tr>
    `).join('');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function gantiData() {
    const btn = document.getElementById('gantiButton');
    const nick = document.getElementById('namaResult').value;
    const sender = document.getElementById('panelMurni').value;

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Processing...';

    try {
        const res = await fetch(`${rorr}?ganti=1&nick=${encodeURIComponent(nick)}&sender=${encodeURIComponent(sender)}`);
        const data = await res.json();
        if (data.success) {
            showToast('Data berhasil diubah', 'success');
        } else {
            showToast(data.message || 'Gagal mengubah data', 'error');
        }
    } catch (e) {
        showToast('Gagal mengubah data', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M23 4V10H17"/><path d="M1 20V14H7"/><path d="M3.51 9C4.717 5.943 7.618 3.75 11 3.75C13.395 3.75 15.585 4.853 17 6.5L23 4"/><path d="M20.49 15C19.283 18.057 16.382 20.25 13 20.25C10.605 20.25 8.415 19.147 7 17.5L1 20"/></svg> Ganti Data`;
    }
}

async function addEmail() {
    const btn = document.getElementById('addEmailButton');
    const email = document.getElementById('emailInput').value.trim();
    const limit = parseInt(document.getElementById('jumlahResult').value) || 1;
    if (!email) { showToast('Email tidak boleh kosong', 'error'); return; }
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Adding...';
    try {
        const res = await fetch(`${rorr}?add=1&email=${encodeURIComponent(email)}&jumlahResult=${limit}`);
        const data = await res.json();
        if (data.success) {
            const p = getProt(); p[email] = { t: limit, c: limit }; setProt(p);
            showToast('Email berhasil ditambahkan', 'success');
            document.getElementById('emailInput').value = '';
            document.getElementById('jumlahResult').value = '1';
        } else {
            showToast(data.message || 'Gagal menambah email', 'error');
        }
    } catch (e) {
        showToast('Gagal menambah email', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add New Email`;
    }
}

async function deleteEmail(email) {
    if (!confirm('Hapus email ini?')) return;

    try {
        const res = await fetch(`${rorr}?delete=1&email=${encodeURIComponent(email)}`);
        const data = await res.json();
        if (data.status === 'success' || data.success) {
            showToast('Email berhasil dihapus', 'success');
            fetchEmails();
        } else {
            showToast(data.message || 'Gagal menghapus email', 'error');
        }
    } catch (e) {
        showToast('Gagal menghapus email', 'error');
    }
}

window.addEventListener('DOMContentLoaded', () => {
    fetchEmails();
    setTimeout(showPopup, 800);
    setInterval(protCheck, 5000);
});
</script>

<div class="music-player hidden" id="musicPlayer">
    <div class="music-cover">
        <img src="https://files.catbox.moe/m3gy46.jpg" alt="Cover" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm);">
    </div>
    <div class="music-info">
        <div class="music-title">Bye</div>
        <div class="music-artist">Altare</div>
    </div>
    <div class="music-visualizer" id="musicVisualizer">
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
    </div>
    <div class="music-controls">
        <button class="music-btn" id="musicToggleBtn" onclick="toggleMusic()">
            <svg viewBox="0 0 24 24" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="music-btn" onclick="hideMusicPlayer()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="music-progress">
        <div class="music-progress-bar" id="musicProgressBar"></div>
    </div>
</div>
</body>
</html>
